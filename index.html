<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Колесо Удачи — Шагай Дома</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #FF6B6B;
    --peach: #FF9A76;
    --yellow: #FFD93D;
    --mint: #6BCB77;
    --sky: #4D96FF;
    --purple: #C77DFF;
    --pink: #FF6FB5;
    --gold: #FFD700;
    --bg: #FFF5F0;
    --dark: #2D2D2D;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Nunito’, sans-serif;
background: var(–bg);
min-height: 100vh;
overflow-x: hidden;
background-image:
radial-gradient(circle at 10% 20%, rgba(255,107,107,0.08) 0%, transparent 50%),
radial-gradient(circle at 90% 80%, rgba(77,150,255,0.08) 0%, transparent 50%),
radial-gradient(circle at 50% 50%, rgba(255,217,61,0.05) 0%, transparent 70%);
}

.confetti-piece {
position: fixed;
width: 10px;
height: 10px;
top: -20px;
opacity: 0;
pointer-events: none;
z-index: 9999;
border-radius: 2px;
}

header {
text-align: center;
padding: 28px 20px 10px;
}

.logo {
font-family: ‘Pacifico’, cursive;
font-size: clamp(22px, 5vw, 34px);
color: var(–coral);
letter-spacing: 1px;
text-shadow: 2px 2px 0 rgba(255,107,107,0.2);
}
.logo span { color: var(–peach); }

.subtitle {
font-size: clamp(13px, 3vw, 16px);
color: #888;
margin-top: 4px;
font-weight: 600;
}

.spins-bar {
display: flex;
justify-content: center;
align-items: center;
gap: 8px;
margin: 18px auto 0;
padding: 12px 22px;
background: white;
border-radius: 50px;
width: fit-content;
box-shadow: 0 4px 20px rgba(0,0,0,0.07);
font-weight: 800;
font-size: 15px;
color: var(–dark);
}
.spin-dot {
width: 14px; height: 14px;
border-radius: 50%;
background: var(–coral);
transition: all 0.4s;
}
.spin-dot.used {
background: #ddd;
transform: scale(0.8);
}
.spins-label { color: #aaa; font-size: 13px; font-weight: 700; margin-right: 4px; }

.main-area {
display: flex;
flex-direction: column;
align-items: center;
padding: 10px 20px 40px;
gap: 0;
position: relative;
}

/* Tagline above wheel */
.tagline {
text-align: center;
margin-bottom: 16px;
}
.tagline h1 {
font-size: clamp(20px, 5vw, 30px);
font-weight: 900;
color: var(–dark);
line-height: 1.2;
}
.tagline h1 em {
font-style: normal;
color: var(–coral);
}
.tagline p {
font-size: clamp(13px, 3vw, 15px);
color: #999;
margin-top: 6px;
font-weight: 600;
}

/* FREE PASS highlight */
.free-pass-banner {
background: linear-gradient(135deg, #FFD93D, #FF9A76);
border-radius: 16px;
padding: 10px 24px;
margin-bottom: 18px;
text-align: center;
box-shadow: 0 6px 24px rgba(255,154,118,0.35);
animation: pulse-banner 2s ease-in-out infinite;
}
.free-pass-banner .fp-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.85); letter-spacing: 2px; text-transform: uppercase; }
.free-pass-banner .fp-main { font-size: clamp(14px, 4vw, 18px); font-weight: 900; color: white; }
.free-pass-banner .fp-sub { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 700; }
@keyframes pulse-banner {
0%, 100% { box-shadow: 0 6px 24px rgba(255,154,118,0.35); transform: scale(1); }
50% { box-shadow: 0 8px 32px rgba(255,154,118,0.55); transform: scale(1.02); }
}

/* Wheel container */
.wheel-wrap {
position: relative;
width: min(380px, 90vw);
height: min(380px, 90vw);
}

.wheel-glow {
position: absolute;
inset: -20px;
border-radius: 50%;
background: radial-gradient(circle, rgba(255,154,118,0.2) 0%, transparent 70%);
animation: glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse {
0%,100% { opacity: 0.6; transform: scale(1); }
50% { opacity: 1; transform: scale(1.05); }
}

canvas#wheel {
width: 100%;
height: 100%;
border-radius: 50%;
box-shadow: 0 12px 60px rgba(0,0,0,0.18), 0 0 0 6px white, 0 0 0 10px rgba(255,107,107,0.2);
display: block;
}

/* Pointer */
.pointer {
position: absolute;
top: -18px;
left: 50%;
transform: translateX(-50%);
width: 0;
height: 0;
border-left: 16px solid transparent;
border-right: 16px solid transparent;
border-top: 36px solid var(–coral);
filter: drop-shadow(0 4px 8px rgba(255,107,107,0.5));
z-index: 10;
}
.pointer::after {
content: ‘’;
position: absolute;
top: -40px;
left: -8px;
width: 16px;
height: 16px;
background: var(–coral);
border-radius: 50%;
}

/* Center button */
.center-btn {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 70px; height: 70px;
border-radius: 50%;
background: white;
border: none;
cursor: pointer;
box-shadow: 0 4px 20px rgba(0,0,0,0.15);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 10;
transition: transform 0.15s, box-shadow 0.15s;
font-family: ‘Nunito’, sans-serif;
}
.center-btn:hover { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
.center-btn:active { transform: translate(-50%, -50%) scale(0.95); }
.center-btn .spin-icon { font-size: 24px; }
.center-btn .spin-txt { font-size: 10px; font-weight: 900; color: var(–coral); letter-spacing: 0.5px; }
.center-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Spin button below */
.spin-btn {
margin-top: 24px;
background: linear-gradient(135deg, var(–coral), var(–peach));
color: white;
border: none;
border-radius: 50px;
padding: 16px 50px;
font-family: ‘Nunito’, sans-serif;
font-size: 18px;
font-weight: 900;
cursor: pointer;
box-shadow: 0 8px 30px rgba(255,107,107,0.4);
transition: all 0.2s;
letter-spacing: 0.5px;
}
.spin-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(255,107,107,0.5); }
.spin-btn:active { transform: translateY(0); }
.spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Result modal */
.modal-bg {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.55);
backdrop-filter: blur(6px);
z-index: 1000;
justify-content: center;
align-items: center;
padding: 20px;
}
.modal-bg.show { display: flex; }

.modal {
background: white;
border-radius: 28px;
padding: 36px 32px;
max-width: 400px;
width: 100%;
text-align: center;
box-shadow: 0 30px 80px rgba(0,0,0,0.25);
animation: modal-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
position: relative;
overflow: hidden;
}
@keyframes modal-in {
from { opacity: 0; transform: scale(0.7) translateY(30px); }
to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-ribbon {
position: absolute;
top: 0; left: 0; right: 0;
height: 6px;
background: linear-gradient(90deg, var(–coral), var(–yellow), var(–mint), var(–sky));
}

.modal-emoji { font-size: 56px; margin-bottom: 8px; display: block; }
.modal-label { font-size: 11px; font-weight: 800; color: #bbb; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.modal-prize { font-size: clamp(20px, 5vw, 26px); font-weight: 900; color: var(–dark); line-height: 1.2; margin-bottom: 12px; }
.modal-promo {
background: linear-gradient(135deg, #FFF3E0, #FFE0CC);
border: 2px dashed var(–peach);
border-radius: 14px;
padding: 12px 18px;
font-size: 22px;
font-weight: 900;
color: var(–coral);
letter-spacing: 3px;
margin: 14px 0;
cursor: pointer;
transition: all 0.2s;
}
.modal-promo:hover { background: linear-gradient(135deg, #FFE0CC, #FFD0B0); transform: scale(1.02); }
.modal-promo .promo-hint { font-size: 11px; color: #aaa; font-weight: 600; letter-spacing: 0; display: block; margin-top: 2px; }

.modal-desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 16px; font-weight: 600; }
.modal-ad {
background: linear-gradient(135deg, #FFF5F0, #FFE8E0);
border-radius: 16px;
padding: 16px;
margin: 14px 0;
font-size: 13px;
color: #555;
line-height: 1.6;
font-weight: 600;
text-align: left;
}
.modal-ad strong { color: var(–coral); }

.modal-close {
background: linear-gradient(135deg, var(–coral), var(–peach));
color: white;
border: none;
border-radius: 50px;
padding: 14px 40px;
font-family: ‘Nunito’, sans-serif;
font-size: 16px;
font-weight: 900;
cursor: pointer;
width: 100%;
margin-top: 8px;
box-shadow: 0 6px 20px rgba(255,107,107,0.35);
transition: all 0.2s;
}
.modal-close:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,107,0.45); }

.modal-close-link {
display: block;
margin-top: 12px;
font-size: 13px;
color: #bbb;
cursor: pointer;
font-weight: 600;
}
.modal-close-link:hover { color: #999; }

/* Final modal special */
.modal.final .modal-prize { color: var(–coral); }
.stars-bg {
position: absolute;
inset: 0;
pointer-events: none;
overflow: hidden;
}
.star {
position: absolute;
font-size: 20px;
opacity: 0.15;
animation: float-star 4s ease-in-out infinite;
}
@keyframes float-star {
0%, 100% { transform: translateY(0) rotate(0deg); }
50% { transform: translateY(-12px) rotate(180deg); }
}

/* No spins state */
.no-spins {
text-align: center;
padding: 20px;
display: none;
}
.no-spins h2 { font-size: 20px; font-weight: 900; color: var(–dark); margin-bottom: 8px; }
.no-spins p { font-size: 14px; color: #888; }

@media (max-width: 480px) {
.modal { padding: 28px 20px; }
.spin-btn { padding: 14px 36px; font-size: 16px; }
}
</style>

</head>
<body>

<header>
  <div class="logo">Шагай<span>Дома</span> 🚶‍♀️</div>
  <div class="subtitle">Клуб ходьбы для стройности и здоровья</div>
  <div class="spins-bar">
    <span class="spins-label">Осталось вращений:</span>
    <div class="spin-dot" id="d1"></div>
    <div class="spin-dot" id="d2"></div>
    <div class="spin-dot" id="d3"></div>
    <div class="spin-dot" id="d4"></div>
    <div class="spin-dot" id="d5"></div>
  </div>
</header>

<div class="main-area">
  <div class="tagline">
    <h1>Крути колесо и<br>выигрывай призы <em>бесплатно!</em></h1>
    <p>5 попыток · Каждое вращение — шанс на подарок</p>
  </div>

  <div class="free-pass-banner">
    <div class="fp-label">🏆 Главный приз</div>
    <div class="fp-main">🎁 Бесплатный абонемент</div>
    <div class="fp-sub">Можешь выиграть прямо сейчас!</div>
  </div>

  <div class="wheel-wrap">
    <div class="wheel-glow"></div>
    <canvas id="wheel" width="500" height="500"></canvas>
    <div class="pointer"></div>
    <button class="center-btn" id="centerBtn" onclick="spin()">
      <span class="spin-icon">🍀</span>
      <span class="spin-txt">КРУТИ!</span>
    </button>
  </div>

<button class="spin-btn" id="spinBtn" onclick="spin()">🎯 Крутить колесо!</button>

</div>

<!-- Result Modal -->

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="modal-ribbon"></div>
    <div class="stars-bg" id="modalStars"></div>
    <span class="modal-emoji" id="modalEmoji"></span>
    <div class="modal-label" id="modalLabel"></div>
    <div class="modal-prize" id="modalPrize"></div>
    <div class="modal-promo" id="modalPromo" style="display:none">
      <span id="promoCode"></span>
      <span class="promo-hint">👆 Нажми, чтобы скопировать</span>
    </div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="modal-ad" id="modalAd"></div>
    <button class="modal-close" id="modalClose" onclick="closeModal()"></button>
    <span class="modal-close-link" onclick="closeModal()">Закрыть</span>
  </div>
</div>

<script>
// ─── SEGMENTS ───────────────────────────────────────────────────────────────
const segments = [
  {
    label: "Скидка\n20%",
    emoji: "🏷️",
    color: "#FF6B6B",
    textColor: "#fff",
    prize: "Скидка 20% на абонемент!",
    promo: "ШАГАЙ20",
    desc: "Твой промокод на 20% скидку активен 48 часов. Введи его при оформлении любого абонемента.",
    weight: 30,
    isFinalPrize: true,
  },
  {
    label: "Меню\nклуба",
    emoji: "📋",
    color: "#4D96FF",
    textColor: "#fff",
    prize: "Меню клуба — PDF гид!",
    desc: "Ты получаешь полное меню клуба со всеми тренировками, расписанием и форматами занятий. Скачай и изучи — тебя ждёт много интересного!",
    weight: 25,
  },
  {
    label: "Бесплатная\nтренировка",
    emoji: "🎽",
    color: "#6BCB77",
    textColor: "#fff",
    prize: "Бесплатная тренировка!",
    desc: "Ты выиграла одну бесплатную тренировку в клубе Шагай Дома. Это твой первый шаг к стройности и здоровью!",
    weight: 22,
  },
  {
    label: "✨ Бесплатный\nАбонемент",
    emoji: "🏆",
    color: "#FFD700",
    textColor: "#5B3A00",
    prize: "🏆 Бесплатный Абонемент!",
    desc: "Невероятно! Ты выиграла бесплатный абонемент в клуб Шагай Дома! Напиши нам в директ или на почту, чтобы активировать подарок.",
    weight: 3,
    isJackpot: true,
  },
  {
    label: "Секретный\nтариф 🕵️",
    emoji: "🕵️",
    color: "#C77DFF",
    textColor: "#fff",
    prize: "Секретный тариф — 1 месяц!",
    desc: "Ты открыла эксклюзивный тариф, которого нет в открытой продаже! Специальные условия на 1 месяц — только для победителей колеса удачи. Свяжись с нами для активации.",
    weight: 10,
  },
  {
    label: "Секретный\nтариф НАВСЕГДА 🔑",
    emoji: "🔑",
    color: "#FF6FB5",
    textColor: "#fff",
    prize: "Секретный тариф НАВСЕГДА!",
    desc: "Поздравляем! Ты выиграла уникальный тариф, которого нет в продаже — доступ к клубу навсегда на специальных условиях! Только для победителей колеса. Напиши нам для активации.",
    weight: 10,
  },
];

// ─── ADs shown after each spin ──────────────────────────────────────────────
const spinAds = [
  `<strong>Шагай Дома</strong> — это больше, чем фитнес. Это сообщество <strong>10 000 женщин</strong> со всего мира, которые худеют на шагах каждый день. Твой путь начинается здесь! 🌍`,
  `Уже <strong>10 000 шагательниц</strong> из разных уголков планеты занимаются с нами и видят результат. Ты тоже можешь! Каждый шаг — это шаг к своей лучшей версии. 💃`,
  `В клубе <strong>Шагай Дома</strong> тебя ждут десятки тренировок, тёплое сообщество и тренеры, которые верят в тебя. <strong>10 000 женщин</strong> уже в пути — присоединяйся! 🚶‍♀️✨`,
  `Ты знала, что ходьба — один из самых эффективных способов похудеть? Наши <strong>10 000 шагательниц</strong> подтверждают это каждый день! <strong>Шагай Дома</strong> — и результаты не заставят ждать. 🎯`,
];

// Final spin AD (guaranteed promo)
const finalAd = `🎉 Это не просто скидка — это твой <strong>билет в клуб мечты!</strong><br><br>
<strong>Шагай Дома</strong> — это <strong>10 000 женщин</strong> из России, Украины, Казахстана, Германии, США и многих других стран, которые уже активно худеют на шагах прямо дома.<br><br>
С нами ты получишь:<br>
🚶‍♀️ Десятки тренировок на любой уровень<br>
💪 Поддержку тёплого женского сообщества<br>
📈 Реальный результат уже через 2–3 недели<br><br>
<strong>Применяй промокод прямо сейчас — он действует 48 часов!</strong>`;

// ─── STATE ───────────────────────────────────────────────────────────────────
let spinsLeft = 5;
let isSpinning = false;
let currentRotation = 0;
let spinCount = 0;

// ─── BUILD WEIGHTED POOL ─────────────────────────────────────────────────────
function buildPool() {
  const pool = [];
  segments.forEach((seg, i) => {
    for (let j = 0; j < seg.weight; j++) pool.push(i);
  });
  return pool;
}

function pickSegment() {
  // Final spin: always give promo (index 0)
  if (spinsLeft === 1) return 0;
  const pool = buildPool();
  // No jackpot on first 3 spins to build tension
  const jackpotIdx = segments.findIndex(s => s.isJackpot);
  const filteredPool = spinsLeft > 2 ? pool.filter(i => i !== jackpotIdx) : pool;
  return filteredPool[Math.floor(Math.random() * filteredPool.length)];
}

// ─── CANVAS DRAW ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const cx = canvas.width / 2;
const cy = canvas.height / 2;
const R = cx - 10;

function drawWheel(rotation) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const n = segments.length;
  const arc = (2 * Math.PI) / n;

  segments.forEach((seg, i) => {
    const start = rotation + i * arc - Math.PI / 2 - arc / 2;
    const end = start + arc;

    // Segment fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, start, end);
    ctx.closePath();

    // Gradient fill
    const grd = ctx.createRadialGradient(cx, cy, R * 0.2, cx, cy, R);
    grd.addColorStop(0, lightenColor(seg.color, 30));
    grd.addColorStop(1, seg.color);
    ctx.fillStyle = grd;
    ctx.fill();

    // Segment border
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Emoji
    const emojiAngle = start + arc / 2;
    const emojiR = R * 0.78;
    const ex = cx + emojiR * Math.cos(emojiAngle);
    const ey = cy + emojiR * Math.sin(emojiAngle);
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(emojiAngle + Math.PI / 2);
    ctx.font = `${R * 0.09}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(seg.emoji, 0, 0);
    ctx.restore();

    // Text
    const textAngle = start + arc / 2;
    const textR = R * 0.52;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(textAngle + Math.PI / 2);
    ctx.font = `bold ${Math.max(11, R * 0.062)}px 'Nunito', sans-serif`;
    ctx.fillStyle = seg.textColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = 4;
    const lines = seg.label.split('\n');
    const lineH = Math.max(14, R * 0.075);
    lines.forEach((line, li) => {
      ctx.fillText(line, 0, textR + (li - (lines.length - 1) / 2) * lineH);
    });
    ctx.restore();
  });

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 4;
  ctx.stroke();

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 38, 0, 2 * Math.PI);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,107,107,0.2)';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function lightenColor(hex, amount) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.min(255, r + amount)}, ${Math.min(255, g + amount)}, ${Math.min(255, b + amount)})`;
}

drawWheel(currentRotation);

// ─── SPIN ─────────────────────────────────────────────────────────────────────
function spin() {
  if (isSpinning || spinsLeft <= 0) return;
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('centerBtn').disabled = true;

  const targetIdx = pickSegment();
  const n = segments.length;
  const arc = (2 * Math.PI) / n;

  // Calculate rotation to land on targetIdx
  // Pointer is at top (rotation=0 means segment 0 is at top)
  // We want targetIdx segment to be under pointer
  const targetAngle = -(targetIdx * arc); // angle of segment center relative to 0
  const extraSpins = (4 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const randomOffset = (Math.random() - 0.5) * arc * 0.6;
  const finalRotation = currentRotation + extraSpins + targetAngle - currentRotation % (2 * Math.PI) + randomOffset;

  // Normalize
  const fullFinal = finalRotation + 2 * Math.PI * 5; // ensure enough spin
  const duration = 4000 + Math.random() * 1500;
  const start = performance.now();
  const startRot = currentRotation;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const rot = startRot + (fullFinal - startRot) * easeOut(t);
    currentRotation = rot;
    drawWheel(rot);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      spinCount++;
      spinsLeft--;
      updateDots();
      currentRotation = rot % (2 * Math.PI);
      showResult(targetIdx);
      if (spinsLeft > 0) {
        document.getElementById('spinBtn').disabled = false;
        document.getElementById('centerBtn').disabled = false;
      }
    }
  }

  requestAnimationFrame(animate);
}

function updateDots() {
  const used = 5 - spinsLeft;
  for (let i = 1; i <= 5; i++) {
    const dot = document.getElementById('d' + i);
    if (i <= used) dot.classList.add('used');
  }
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function showResult(idx) {
  const seg = segments[idx];
  const isFinal = spinsLeft === 0;

  document.getElementById('modalEmoji').textContent = seg.emoji;
  document.getElementById('modalLabel').textContent = isFinal ? '🎊 Последнее вращение — твой подарок!' : '🎉 Поздравляем!';
  document.getElementById('modalPrize').textContent = isFinal ? '🏷️ Скидка 20% на абонемент!' : seg.prize;

  // Promo code
  const promoEl = document.getElementById('modalPromo');
  const promoCode = document.getElementById('promoCode');
  if (isFinal || seg.promo) {
    promoEl.style.display = 'block';
    promoCode.textContent = isFinal ? 'ШАГАЙ20' : seg.promo;
    promoEl.onclick = () => {
      navigator.clipboard.writeText(isFinal ? 'ШАГАЙ20' : seg.promo).catch(() => {});
      promoCode.textContent = '✅ Скопировано!';
      setTimeout(() => { promoCode.textContent = isFinal ? 'ШАГАЙ20' : seg.promo; }, 2000);
    };
  } else {
    promoEl.style.display = 'none';
  }

  document.getElementById('modalDesc').textContent = isFinal
    ? 'Твой промокод на 20% скидку активен 48 часов. Введи его при оформлении любого абонемента.'
    : seg.desc;

  const adEl = document.getElementById('modalAd');
  adEl.innerHTML = isFinal ? finalAd : spinAds[(spinCount - 1) % spinAds.length];

  const btn = document.getElementById('modalClose');
  if (isFinal) {
    btn.textContent = '🚀 Хочу попасть в клуб!';
  } else if (spinsLeft > 0) {
    btn.textContent = `Отлично! Ещё ${spinsLeft} вращени${spinsLeft === 1 ? 'е' : 'я'} 🎯`;
  } else {
    btn.textContent = '✨ Получить приз!';
  }

  const modal = document.getElementById('modal');
  modal.className = 'modal' + (seg.isJackpot ? ' final' : '');

  // Stars for jackpot
  const starsEl = document.getElementById('modalStars');
  starsEl.innerHTML = '';
  if (seg.isJackpot || isFinal) {
    const starChars = ['⭐','✨','🌟','💫'];
    for (let i = 0; i < 8; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = starChars[i % starChars.length];
      s.style.left = (10 + Math.random() * 80) + '%';
      s.style.top = (10 + Math.random() * 80) + '%';
      s.style.animationDelay = (Math.random() * 3) + 's';
      s.style.animationDuration = (3 + Math.random() * 2) + 's';
      starsEl.appendChild(s);
    }
  }

  document.getElementById('modalBg').classList.add('show');

  if (seg.isJackpot || isFinal) launchConfetti();
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
  if (spinsLeft === 0) {
    document.getElementById('spinBtn').style.display = 'none';
  }
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6FB5','#C77DFF','#FF9A76'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.width = el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(el);
      el.animate([
        { top: '-20px', opacity: 1, transform: `rotate(0deg) translateX(0)` },
        { top: '110vh', opacity: 0, transform: `rotate(${360 + Math.random() * 360}deg) translateX(${(Math.random() - 0.5) * 200}px)` }
      ], {
        duration: 2500 + Math.random() * 1500,
        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
        fill: 'forwards'
      }).onfinish = () => el.remove();
    }, i * 40);
  }
}
</script>
