    var s=SEG[i];
    var sa=r-Math.PI/2+i*ARC, a0=sa-ARC/2, a1=sa+ARC/2;
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,a0,a1); ctx.closePath();
    ctx.fillStyle=s.bg; ctx.fill();
    // Блик
    var g=ctx.createRadialGradient(CX,CY,R*0.04,CX,CY,R);
    g.addColorStop(0,'rgba(255,255,255,.2)');
    g.addColorStop(0.45,'rgba(255,255,255,.04)');
    g.addColorStop(1,'rgba(0,0,0,.09)');
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,a0,a1); ctx.closePath();
    ctx.fillStyle=g; ctx.fill();
    // Разделитель
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,a0,a1); ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,.65)'; ctx.lineWidth=3; ctx.stroke();
  }

  // Проход 2: текст и эмодзи
  for(var i=0;i<N;i++){
    var s=SEG[i];
    var sa=r-Math.PI/2+i*ARC;

    // Эмодзи — у обода
    var eR=R*0.76;
    ctx.save();
    ctx.translate(CX+eR*Math.cos(sa), CY+eR*Math.sin(sa));
    ctx.rotate(sa+Math.PI/2);
    // Рисуем через Image для цветных эмодзи
    ctx.font=Math.round(R*0.082)+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // Убираем shadow чтобы не было серого ореола вокруг эмодзи
    ctx.shadowColor='transparent'; ctx.shadowBlur=0;
    ctx.fillText(s.emoji,0,0);
    ctx.restore();

    // Текст — между центром и эмодзи, шрифт Nunito (загружен)
    var lines=s.label;
    var tR=R*0.41;
    var fs=Math.max(12, Math.round(R*0.056));
    var lh=fs*1.22;
    var totalH=(lines.length-1)*lh;
    ctx.save();
    ctx.translate(CX+tR*Math.cos(sa), CY+tR*Math.sin(sa));
    ctx.rotate(sa+Math.PI/2);
    ctx.font='900 '+fs+'px Nunito,Arial,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // Весь текст — белый с тёмной обводкой для читаемости на любом фоне
    // Сначала обводка
    ctx.strokeStyle='rgba(0,0,0,.35)';
    ctx.lineWidth=3;
    ctx.lineJoin='round';
    lines.forEach(function(ln,li){
      ctx.strokeText(ln, 0, -totalH/2+li*lh);
    });
    // Потом заливка белым
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,.3)'; ctx.shadowBlur=3;
    lines.forEach(function(ln,li){
      ctx.fillText(ln, 0, -totalH/2+li*lh);
    });
    ctx.restore();
  }

  // Внешнее кольцо
  ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.lineWidth=6; ctx.stroke();
  // Центральный круг
  ctx.beginPath(); ctx.arc(CX,CY,36,0,2*Math.PI);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='rgba(232,25,44,.15)'; ctx.lineWidth=3; ctx.stroke();
}

drawWheel(rot);
setTimeout(function(){drawWheel(rot);},200);
setTimeout(function(){drawWheel(rot);},700);
if(document.fonts&&document.fonts.ready){
  document.fonts.ready.then(function(){drawWheel(rot);});
}

// ── LOGIC ─────────────────────────────────────────────────────────────────────
function pickIdx(){
  if(spinsLeft===1) return SEG.findIndex(function(s){return s.isFinal;});
  var pool=[];
  SEG.forEach(function(s,i){
    if(s.isJackpot&&spinsLeft>2) return;
    for(var j=0;j<s.w;j++) pool.push(i);
  });
  return pool[Math.floor(Math.random()*pool.length)];
}

function spin(){
  if(busy||spinsLeft<=0) return;
  busy=true; btnOff();
  var ti=pickIdx();
  var targetRot=((-ti*ARC)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  var jitter=(Math.random()-.5)*ARC*0.55;
  var targetJ=(targetRot+jitter+2*Math.PI)%(2*Math.PI);
  var curNorm=((rot%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  var delta=((targetJ-curNorm)+2*Math.PI)%(2*Math.PI);
  if(delta<0.4) delta+=2*Math.PI;
  var total=(5+Math.floor(Math.random()*4))*2*Math.PI+delta;
  var startRot=rot, dur=4200+Math.random()*1100, t0=performance.now();
  function ease(t){return 1-Math.pow(1-t,3.8);}
  requestAnimationFrame(function go(now){
    var t=Math.min((now-t0)/dur,1);
    rot=startRot+total*ease(t);
    drawWheel(rot);
    if(t<1){requestAnimationFrame(go);return;}
    busy=false; spinNum++; spinsLeft--;
    updateDots();
    var afterSpin=function(){
      if(SEG[ti].isRetry){
        if(spinsLeft>0){toast('🔄 Крути ещё раз! Удача близко!');btnOn();}
        else showModal(SEG.findIndex(function(s){return s.isFinal;}));
      } else {
        showModal(ti);
        if(spinsLeft>0) btnOn();
      }
      if(spinsLeft===0){
        document.getElementById('sbtn').style.display='none';
        document.getElementById('doneMsg').style.display='block';
      }
    };
    if(spinNum===2&&!SEG[ti].isRetry){showAdVideo(afterSpin);}
    else{afterSpin();}
  });
}

function btnOff(){['sbtn','cbtn'].forEach(function(id){document.getElementById(id).disabled=true;});}
function btnOn(){['sbtn','cbtn'].forEach(function(id){document.getElementById(id).disabled=false;});}
function updateDots(){
  var used=5-spinsLeft;
  for(var i=1;i<=5;i++) document.getElementById('d'+i).classList.toggle('off',i<=used);
}

// ── VIDEO ─────────────────────────────────────────────────────────────────────
function showAdVideo(callback){
  var frame=document.getElementById('vframe');
  var skipBtn=document.getElementById('skipBtn');
  skipBtn.style.display='none';
  skipBtn.disabled=true;
  skipBtn.innerHTML='Пропустить <span class="skip-countdown" id="skipCount">5</span>';
  document.getElementById('vcloseBtn').style.display='none';
  frame.src=AD_VIDEO_URL;
  document.getElementById('voverlay').classList.add('show');
  window._adCallback=callback;
  function startCountdown(){
    skipBtn.style.display='block';
    var sec=5;
    function tick(){
      var sc=document.getElementById('skipCount');
      if(sc) sc.textContent=sec;
      if(sec<=0){clearInterval(skipTimer);skipBtn.disabled=false;skipBtn.innerHTML='Пропустить ✕';return;}
      sec--;
    }
    tick();
    skipTimer=setInterval(tick,1000);
  }
  frame.onload=startCountdown;
  setTimeout(function(){if(skipBtn.style.display==='none') startCountdown();},4000);
}

function skipAd(){
  clearInterval(skipTimer);
  document.getElementById('vframe').src='';
  document.getElementById('voverlay').classList.remove('show');
  if(window._adCallback){window._adCallback();window._adCallback=null;}
}

function showPrizeVideo(){
  document.getElementById('vframe').src=PRIZE_VIDEO_URL;
  document.getElementById('skipBtn').style.display='none';
  document.getElementById('vcloseBtn').style.display='flex';
  document.getElementById('voverlay').classList.add('show');
}
function closeVideo(){
  document.getElementById('vframe').src='';
  document.getElementById('voverlay').classList.remove('show');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(idx){
  var s=SEG[idx], fin=spinsLeft===0;
  document.getElementById('mEmoji').textContent=s.emoji;
  document.getElementById('mTag').textContent=fin?'🎊 Последнее вращение!':'🎉 Поздравляем!';
  var tel=document.getElementById('mTitle');
  tel.textContent=s.prize;
  tel.className='m-title'+(s.isJackpot||fin?' red':'');
  var pel=document.getElementById('mPromo');
  if((s.promo||fin)&&!s.isJackpot){
    pel.style.display='block';
    lastCode=fin?'LUCKY':s.promo;
    document.getElementById('mCode').textContent=lastCode;
  } else pel.style.display='none';
  document.getElementById('mDesc').textContent=s.desc;

  // Рекламная карточка с фото
  var adcard=document.getElementById('adcard');
  var adTtl=document.getElementById('adTtl');
  var adP=document.getElementById('mAd');
  // Убираем старое фото если было
  var oldImg=adcard.querySelector('.adcard-img');
  if(oldImg) oldImg.remove();

  if(fin){
    adTtl.textContent='🚶‍♀️ О клубе ШАГАЙ ДОМА';
    adP.innerHTML=FINAL_AD;
  } else {
    var ad=ADS[(spinNum-1)%ADS.length];
    adTtl.textContent=ad.title;
    adP.innerHTML=ad.text;
    if(ad.img){
      var img=document.createElement('img');
      img.src=ad.img; img.className='adcard-img'; img.alt='';
      adcard.insertBefore(img, adcard.querySelector('.adcard-body'));
    }
  }

  var badge=document.getElementById('mBadge');
  if(spinsLeft>0){
    badge.style.display='inline-flex';
    document.getElementById('mBadgeTxt').textContent='Ещё '+spinsLeft+' вращени'+(spinsLeft===1?'е':'я');
  } else badge.style.display='none';

  var acts=document.getElementById('mActions'); acts.innerHTML='';
  if(s.isJackpot){
    acts.innerHTML='<div style="background:#FFF5F6;border-radius:13px;padding:16px 14px;margin-bottom:4px"><div style="font-size:13px;font-weight:800;color:#1A1A2E;margin-bottom:10px;line-height:1.5">📧 Оставь свою почту — мы активируем твой бесплатный абонемент:</div><input id="jackpotEmail" type="email" placeholder="твоя@почта.ru" style="width:100%;border:2px solid #E8E8E8;border-radius:10px;padding:12px 14px;font-family:Nunito,sans-serif;font-size:15px;font-weight:700;outline:none;box-sizing:border-box;margin-bottom:10px;transition:border-color .2s" onfocus="this.style.borderColor=\'#E8192C\'" onblur="this.style.borderColor=\'#E8E8E8\'"><button onclick="submitJackpot()" style="width:100%;background:linear-gradient(135deg,#E8192C,#FF5C35);color:#fff;border:none;border-radius:11px;padding:14px;font-family:Unbounded,sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 5px 16px rgba(232,25,44,.3)">🏆 Получить бесплатный абонемент!</button><div id="jackpotStatus" style="font-size:12px;text-align:center;margin-top:8px;font-weight:700;color:#aaa"></div></div>';
  } else if(s.isMenuPdf){
    mkBtn(acts,'📥 Скачать рецепты PDF бесплатно!',function(){var a=document.createElement('a');a.href='menu.pdf';a.download='menu.pdf';document.body.appendChild(a);a.click();document.body.removeChild(a);closeModal();});
  } else if(s.isTraining){
    mkBtn(acts,'▶️ Смотреть тренировку прямо сейчас!',function(){closeModal();showPrizeVideo();});
  } else if(s.isPromo490){
    mkBtn(acts,'🎁 Получить промо-неделю за 490 руб!',function(){window.open(PROMO490_URL,'_blank');closeModal();});
  } else if(s.is1Month){
    mkBtn(acts,'🕵️ Забрать секретный тариф на месяц!',function(){window.open(URL_1MONTH,'_blank');closeModal();});
  } else if(s.isForever){
    mkBtn(acts,'🔑 Забрать тариф НАВСЕГДА!',function(){window.open(URL_FOREVER,'_blank');closeModal();});
  } else if(s.isDiscount||fin){
    mkBtn(acts,'🛒 Перейти к покупке со скидкой 20%',function(){window.open(BUY_URL,'_blank');closeModal();});
  } else {
    mkBtn(acts,'✅ Забрать приз!',function(){closeModal();});
  }
  if(spinsLeft>0&&!fin&&!s.isJackpot){
    var br=document.createElement('button'); br.className='btn-respin';
    br.textContent='🎯 Крутить ещё раз ('+spinsLeft+' вращени'+(spinsLeft===1?'е':'я')+')';
    br.onclick=function(){closeModal();}; acts.appendChild(br);
    var w=document.createElement('div'); w.className='respin-warn';
    w.textContent='⚠️ Если крутишь снова — текущий приз сгорает!'; acts.appendChild(w);
  }
  document.getElementById('overlay').classList.add('show');
  if(s.isJackpot||fin) confetti();
}

function mkBtn(p,l,fn){var b=document.createElement('button');b.className='btn-take';b.innerHTML=l;b.onclick=fn;p.appendChild(b);}
function closeModal(){document.getElementById('overlay').classList.remove('show');}

function submitJackpot(){
  var email=document.getElementById('jackpotEmail').value.trim();
  var status=document.getElementById('jackpotStatus');
  if(!email||!email.includes('@')||!email.includes('.')){status.style.color='#E8192C';status.textContent='Пожалуйста, введи корректный email 📧';return;}
  status.style.color='#aaa';status.textContent='Отправляем...';
  fetch(FORMSPREE_URL,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify({email:email,prize:'Бесплатный абонемент',source:'Колесо удачи ШагайДома'})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok){document.getElementById('jackpotEmail').style.display='none';document.querySelector('[onclick="submitJackpot()"]').style.display='none';status.style.color='#22aa55';status.style.fontSize='14px';status.textContent='🎉 Готово! Мы скоро напишем тебе на почту!';}
    else{status.style.color='#E8192C';status.textContent='Что-то пошло не так. Попробуй ещё раз.';}
  })
  .catch(function(){status.style.color='#E8192C';status.textContent='Ошибка сети. Напиши нам напрямую.';});
}

function copyCode(){
  navigator.clipboard.writeText(lastCode).catch(function(){});
  var el=document.getElementById('mCode'),o=el.textContent;
  el.textContent='✅ Скопировано!';setTimeout(function(){el.textContent=o;},2000);
}
function toast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#fff;border-radius:50px;padding:11px 20px;font-family:inherit;font-size:14px;font-weight:800;box-shadow:0 8px 22px rgba(0,0,0,.22);z-index:200;white-space:nowrap;';
  t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2400);
}
function confetti(){
  var cols=['#E8192C','#FF6B35','#F5A623','#FFD166','#FF4D5E','#fff'];
  for(var i=0;i<65;i++)(function(i){setTimeout(function(){
    var el=document.createElement('div');el.className='cp';
    el.style.left=Math.random()*100+'vw';
    el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.borderRadius=Math.random()>.4?'50%':'2px';
    var sz=6+Math.random()*8;el.style.width=el.style.height=sz+'px';
    document.body.appendChild(el);
    el.animate([{top:'-20px',opacity:1,transform:'rotate(0)'},{top:'108vh',opacity:0,transform:'rotate('+(400+Math.random()*360)+'deg) translateX('+(Math.random()-.5)*160+'px)'}],
    {duration:2000+Math.random()*1500,easing:'cubic-bezier(.2,.8,.4,1)',fill:'forwards'}).onfinish=function(){el.remove();};
  },i*32);})(i);
}
