<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Колесо удвоения — ШАГАЙ ДОМА</title>
<style>
  :root{
    --red:#CF2C02; --yellow:#FFBA08; --orange:#E85D04; --white:#FFFFFF; --gray:#D9D9D9;
    --bg:#fff; --fg:#1b1b1b;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--fg); background:var(--bg); display:flex; min-height:100svh; align-items:center; justify-content:center;
  }
  .wrap{width:min(980px,92vw); padding:20px; display:grid; gap:20px; grid-template-columns: 1fr; }
  .card{
    background:#fff; border:1px solid var(--gray); border-radius:20px; padding:20px;
    box-shadow:0 8px 30px rgba(0,0,0,.06);
  }
  .title{
    display:flex; align-items:center; gap:12px; margin:0 0 8px 0; font-weight:800; letter-spacing:.2px;
  }
  .subtitle{margin:0 0 16px 0; color:#555}
  .grid{display:grid; gap:20px; grid-template-columns: 1fr; }
  @media (min-width: 860px){
    .grid{grid-template-columns: 1.1fr .9fr;}
  }
  .wheel-wrap{position:relative; aspect-ratio:1/1; max-width:560px; margin-inline:auto;}
  canvas{width:100%; height:100%;}
  .pointer{
    position:absolute; inset:auto 50% calc(100% + 8px) auto; translate:-50% 0;
    width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent;
    border-bottom:26px solid var(--red); filter:drop-shadow(0 2px 0 rgba(0,0,0,.15));
  }
  .btns{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  button{
    appearance:none; border:none; border-radius:14px; padding:14px 20px; font-weight:700; cursor:pointer;
    background:var(--red); color:#fff; box-shadow:0 6px 16px rgba(207,44,2,.28); transition:.2s;
  }
  button:hover{transform:translateY(-1px)}
  button[disabled]{opacity:.6; cursor:not-allowed; transform:none}
  .pill{
    background:var(--yellow); color:#000; font-weight:700; border-radius:999px; padding:6px 10px; font-size:12px;
  }
  .result{
    margin-top:12px; font-size:18px; font-weight:700; min-height:1.6em;
  }
  .legend{display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:10px; margin-top:10px;}
  .legend .item{display:flex; align-items:center; gap:8px; font-size:14px}
  .swatch{width:14px; height:14px; border-radius:4px; border:1px solid rgba(0,0,0,.08)}
  .note{font-size:12px; color:#666}
  .brandbar{height:6px; background:linear-gradient(90deg, var(--red), var(--orange), var(--yellow))}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🎡 Колесо удвоения</div>
      <p class="subtitle">Крути колесо и смотри, что достанется: <span class="pill">УДВОЕНИЕ</span>, бонусы и подарки. Всё на мягкой удаче — как наши тренировки 😊</p>
      <div class="grid">
        <!-- WHEEL -->
        <div class="wheel-wrap">
          <div class="pointer" aria-hidden="true"></div>
          <canvas id="wheel" width="900" height="900" aria-label="Колесо призов"></canvas>
        </div>

        <!-- Controls -->
        <div>
          <div class="btns">
            <button id="spinBtn">Крутить</button>
            <button id="resetBtn" style="background:var(--orange)">Сбросить</button>
            <span class="note">Можно зафиксировать приз: параметр URL <code>?prize=УДВОЕНИЕ</code></span>
          </div>
          <div class="result" id="result"></div>

          <h3 style="margin:18px 0 8px 0">Призы на колесе</h3>
          <div class="legend" id="legend"></div>
          <p class="note">Редактируйте состав и шансы в массиве <code>SEGMENTS</code> ниже. Повторяющийся приз = выше шанс.</p>
        </div>
      </div>
    </div>
    <div class="brandbar" aria-hidden="true"></div>
  </div>

<script>
/* ========= НАСТРОЙКИ ========= */
// Сегменты: label — подпись, color — цвет сектора (брендовая палитра).
// Повторите объект, чтобы увеличить шанс выпадения (вес).
const SEGMENTS = [
  { label: "УДВОЕНИЕ", color: "#CF2C02" },        // главный приз
  { label: "+7 дней доступа", color: "#FFBA08" },
  { label: "−50% на 1 мес", color: "#E85D04" },
  { label: "Промокод −20%", color: "#CF2C02" },
  { label: "Видео в подарок", color: "#FFBA08" },
  { label: "Попробуй снова", color: "#D9D9D9" },
  { label: "Промокод −15%", color: "#E85D04" },
  { label: "УДВОЕНИЕ", color: "#CF2C02" },        // дублируем для веса
  { label: "+3 дня доступа", color: "#FFBA08" },
  { label: "Промо-тренировка", color: "#E85D04" },
  { label: "Попробуй снова", color: "#D9D9D9" },
  { label: "Стикер-пак", color: "#FFBA08" }
];

// Длительность и физика вращения
const SPIN_TURNS_MIN = 4;      // минимальное число полных оборотов
const SPIN_TURNS_MAX = 6;      // максимальное число полных оборотов
const SPIN_MS = 4500;          // длительность анимации (мс)
const POINTER_OFFSET_DEG = 0;  // указатель сверху — 0°, можно чуть сместить при желании

/* ========= ВСПОМОГАТЕЛЬНЫЕ ========= */
const wheel = document.getElementById('wheel');
const ctx = wheel.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const resetBtn = document.getElementById('resetBtn');
const resultEl = document.getElementById('result');
const legendEl = document.getElementById('legend');

let angle = 0;           // текущий угол (рад)
let spinning = false;    // флаг анимации
let lastPrize = null;

/* Легенда */
function renderLegend(){
  legendEl.innerHTML = '';
  SEGMENTS.forEach((s, i)=>{
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<span class="swatch" style="background:${s.color}"></span><span>${i+1}. ${s.label}</span>`;
    legendEl.appendChild(div);
  });
}

/* Рисуем сегменты + текст */
function drawWheel(){
  const { width, height } = wheel;
  const cx = width/2, cy = height/2;
  const r = Math.min(cx, cy) - 8;
  ctx.clearRect(0,0,width,height);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  const n = SEGMENTS.length;
  const slice = 2*Math.PI / n;

  ctx.font = "bold 28px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for(let i=0;i<n;i++){
    // сектор
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.fillStyle = SEGMENTS[i].color;
    ctx.arc(0,0, r, i*slice, (i+1)*slice);
    ctx.closePath();
    ctx.fill();

    // разделитель
    ctx.strokeStyle = "rgba(255,255,255,.9)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0,0, r, i*slice, (i+1)*slice);
    ctx.stroke();

    // текст
    ctx.save();
    const theta = i*slice + slice/2;
    ctx.rotate(theta);
    ctx.fillStyle = "#000";
    const text = SEGMENTS[i].label;
    // подложка для контраста на светлых секторах
    // не рисуем отдельную подложку, используем лёгкую тень
    ctx.shadowColor = "rgba(0,0,0,.15)";
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    wrapText(ctx, text, 0, -r*0.62, r*0.42, 30);
    ctx.restore();
  }

  // центр
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(0,0, r*0.18, 0, 2*Math.PI);
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#D9D9D9";
  ctx.stroke();

  // центр-кнопка визуальная
  ctx.fillStyle = "#CF2C02";
  ctx.beginPath();
  ctx.arc(0,0, r*0.11, 0, 2*Math.PI);
  ctx.fill();
  ctx.restore();
}

/* Перенос слов по ширине */
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = text.split(' ');
  let line = '';
  const lines = [];
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      lines.push(line.trim());
      line = words[n] + ' ';
    } else {
      line = testLine;
    }
  }
  lines.push(line.trim());
  const startY = y - (lines.length-1)*lineHeight/2;
  lines.forEach((ln, i)=> ctx.fillText(ln, x, startY + i*lineHeight));
}

/* easing (easeOutCubic) */
function easeOut(t){ return 1 - Math.pow(1 - t, 3); }

/* Определение сегмента по углу */
function pickByAngle(rad){
  const n = SEGMENTS.length;
  // преобразуем текущий абсолютный угол в сектор указателя
  // указатель на 12 часов => угол  -angle  (+смещение)
  const pointerRad = ( ( -angle ) + deg2rad(POINTER_OFFSET_DEG) ) % (2*Math.PI);
  let a = pointerRad;
  if (a < 0) a += 2*Math.PI;
  const slice = 2*Math.PI / n;
  // сектор нумеруется с 0 по часовой стрелке, но мы рисуем с 0 рад вправо — корректируем
  const idx = Math.floor(a / slice);
  // визуально указатель «смотрит» на верх, но наш ноль в Canvas по оси X,
  // мы уже сдвинули поворотом — формула выше выдаёт корректный индекс
  return (n - idx) % n; // инвертируем, чтобы совпасть с направлением
}

/* Угол для нужного приза (фиксация результата) */
function angleForPrize(label){
  const n = SEGMENTS.length;
  const sliceDeg = 360 / n;
  // найдём все индексы с таким лейблом (если повторяется)
  const indices = [];
  SEGMENTS.forEach((s,i)=>{ if(s.label === label) indices.push(i); });
  if(!indices.length) return null;
  const idx = indices[Math.floor(Math.random()*indices.length)];
  // Чтобы указатель попал в сектор idx, конечный угол должен поставить центр этого сектора под указатель
  const targetCenterDeg = idx*sliceDeg + sliceDeg/2;
  // Наш указатель сверху (0°), а колесо вращаем по часовой — значит, конечный угол = targetCenterDeg (в рад) со знаком +
  const targetRad = deg2rad(targetCenterDeg);
  return targetRad;
}

function deg2rad(d){ return d*Math.PI/180; }
function rad2deg(r){ return r*180/Math.PI; }

/* Основной спин */
function spin(forcePrize=null){
  if(spinning) return;
  spinning = true;
  spinBtn.disabled = true;
  resultEl.textContent = "Крутим…";

  const n = SEGMENTS.length;
  const slice = 2*Math.PI / n;

  // Кол-во оборотов
  const turns = rand(SPIN_TURNS_MIN, SPIN_TURNS_MAX);
  let targetAngle;

  if(forcePrize){
    const prizeAngle = angleForPrize(forcePrize);
    if(prizeAngle !== null){
      // итоговый угол = текущий + целевой под указатель + несколько оборотов
      targetAngle = angle + (turns * 2*Math.PI) + prizeAngle;
    }else{
      // если нет такого приза — крутим случайно
      targetAngle = angle + (turns * 2*Math.PI) + Math.random() * 2*Math.PI;
    }
  }else{
    targetAngle = angle + (turns * 2*Math.PI) + Math.random() * 2*Math.PI;
  }

  const start = performance.now();
  const duration = SPIN_MS;

  function frame(now){
    const t = Math.min(1, (now - start)/duration);
    const eased = easeOut(t);
    angle = angle + (targetAngle - angle) * eased;
    drawWheel();

    if(t < 1){
      requestAnimationFrame(frame);
    }else{
      // финальная фиксация
      angle = targetAngle % (2*Math.PI);
      drawWheel();
      const idx = pickByAngle(angle);
      lastPrize = SEGMENTS[idx].label;
      resultEl.textContent = `🎉 Ваш приз: ${lastPrize}`;
      spinning = false;
      spinBtn.disabled = false;
    }
  }
  requestAnimationFrame(frame);
}

function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

/* Сброс */
function resetWheel(){
  if(spinning) return;
  angle = 0;
  lastPrize = null;
  resultEl.textContent = "";
  drawWheel();
}

/* Инициализация */
renderLegend();
drawWheel();

/* Управление */
spinBtn.addEventListener('click', ()=>{
  const url = new URL(location.href);
  const qp = url.searchParams.get('prize');
  const forceAttr = document.body.getAttribute('data-force-prize');
  const forcePrize = forceAttr || qp || null;
  spin(forcePrize);
});
resetBtn.addEventListener('click', resetWheel);

/* Поддержка data-force-prize (можно задать в разметке) */
// <body data-force-prize="УДВОЕНИЕ">
</script>
</body>
</html>
